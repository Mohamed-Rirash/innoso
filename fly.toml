app = "innoso"
primary_region = "dxb"

[build]

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_HOST = "innoso.fly.dev"
  PORT = "8080"
  DATABASE_PATH = "/data/innoso_prod.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "innoso_data"
  destination = "/data"
  initial_size = "1gb"
